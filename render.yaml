services:
  - type: web
    name: velvet-blade-studio
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DB_PATH
        value: /var/data/barber-central.sqlite
    disk:
      name: velvet-blade-data
      mountPath: /var/data
      sizeGB: 1
